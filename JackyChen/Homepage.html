	<!--蛋炒饭做法标题-->
	<h2 style='text-align:center;'>嚎赤的蛋炒饭</h2>
	<!--做法步骤-->
	<p style='font-size:20px;'>1. 热锅凉油，油烧至6成热（微微冒烟），倒入蛋液，快速用筷子划散成金黄蛋碎，盛出备用。</p>

	<p style='font-size:20px;'>2. 锅中留底油，下火腿丁小火煸炒出香味，再放入米饭，转大火快速翻炒，用锅铲按压打散结块的米饭，炒至米饭粒粒分明、表面微干。</p>

	<p style='font-size:20px;'>3. 加适量盐+少许白胡椒粉调味（火腿本身有咸味，盐要少放），放入炒好的蛋碎和虾仁，继续大火快炒1分钟，让所有食材混合均匀、虾仁完全熟透。</p>

	<p style='font-size:20px;'>4. 出锅前可撒少许葱花增香，也可滴几滴香油提味。</p>
