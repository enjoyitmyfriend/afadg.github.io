    <h2>游戏介绍</h2>
    <p>APEX英雄是一款免费的大逃杀游戏，由Respawn Entertainment开发。</p>
    
    <p>游戏的主要特点：</p>
    <ul>
        <li>免费游玩</li>
        <li>三人小队模式</li>
        <li>每个英雄有独特技能</li>
        <li>多种游戏模式</li>
    </ul>
    
    <p>游戏规则：</p>
    <ol>
        <li>60名玩家组成20支队伍</li>
        <li>从飞机上跳伞到地图任意位置</li>
        <li>收集武器和装备</li>
        <li>安全区会不断缩小</li>
        <li>最后存活的队伍获胜</li>
    </ol>
