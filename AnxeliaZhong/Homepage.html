<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 米津玄师 | 全能艺术家</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #2c2c2c;
            font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.7;
            position: relative;
            overflow-x: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 3.5em;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        
        .intro-text {
            font-size: 1.3em;
            max-width: 800px;
            margin: 0 auto 30px;
            color: #555;
            font-weight: 300;
            line-height: 1.8;
        }
        
        .hero-image {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            margin: 30px 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }
        
        .hero-image:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin: 50px 0;
            padding: 0 20px;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .gallery-item:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        }
        
        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        
        .gallery-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .gallery-item:hover::after {
            opacity: 1;
        }
        
        nav {
            margin: 50px 0;
            padding: 0 20px;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        nav a {
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        nav a::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        nav a:hover::before {
            width: 300px;
            height: 300px;
        }
        
        nav a:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }
        
        nav a span {
            position: relative;
            z-index: 1;
        }
        
        footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            color: #777;
            font-size: 0.95em;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }
            
            .intro-text {
                font-size: 1.1em;
            }
            
            .gallery {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            nav a {
                padding: 15px 30px;
                font-size: 1em;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 2em;
            }
            
            header {
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ 米津玄师 Kenshi Yonezu</h1>
            <p class="intro-text">
                「君の名は、僕の歌になる」—— 从VOCALOID到全球巨星，他用音符与画笔编织世界。
            </p>
            <img src="image/michi1.jpg" alt="米津玄师演唱会主舞台" class="hero-image">
        </header>

        <div class="gallery">
            <div class="gallery-item">
                <img src="image/michi2.jpg" alt="早期VOCALOID插画「ハチ」风格">
            </div>
            <div class="gallery-item">
                <img src="image/michi3.jpg" alt="Lemon MV经典镜头">
            </div>
            <div class="gallery-item">
                <img src="image/michi4.jpg" alt="STRAY SHEEP专辑封面">
	<!-- 
        
        这里用三张图讲述米津玄师的三个身份：
        1. 插画师（michi2）→ 艺术起点
        2. 歌手（michi3）→ 情感共鸣
        3. 专辑设计师（michi4）→ 视觉统一性
        布局采用弹性盒子，自动适配手机/电脑
        -->
            </div>
        </div>

        <nav>
            <ul>
                <li><a href="bio.html"><span>👤 关于他</span></a></li>
                <li><a href="works.html"><span>💿 作品宇宙</span></a></li>
		<li><a href="index.html"><span>写真同人</span></a></li>
		<a href="Homepage.html" class="back">返回首页</a>
		
            </ul>
        </nav>

        <footer>
            <p>作者：Anxelia钟祉瑜 | 日期：2026年1月22日 | 学校：清仁sjna</p>
        </footer>
    </div>
</body>
</html>
